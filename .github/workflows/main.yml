name: Java CI with Gradle + Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # 3. Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4. Build Spring Boot app
      - name: Build with Gradle
        run: ./gradlew build

      # 5. Debug: show JAR file (optional but useful)
      - name: List build artifacts
        run: ls -lah build/libs

      # 6. Login to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/first-app:${{ github.sha }} .

      # 8. Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/first-app:${{ github.sha }}
